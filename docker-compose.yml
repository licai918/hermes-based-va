# Local-first Toee Business Datastore (ADR-0140 system-of-record, ADR-0142
# local-first). Brings up a Postgres equivalent to the deferred Cloud SQL target
# so the datastore, migrations, and per-profile API servers run end-to-end
# locally. Apply schema with:  uv run python -m hermes_runtime.datastore.migrate
# (prefix HERMES_APPLY_DEV_SEED=1 to also seed the local-dev demo accounts + cases).
services:
  postgres:
    image: postgres:16
    container_name: toee-va-postgres
    environment:
      POSTGRES_USER: toee
      POSTGRES_PASSWORD: toee
      POSTGRES_DB: toee_va
    ports:
      - "5432:5432"
    volumes:
      - toee_pgdata:/var/lib/postgresql/data
      # Provisions the separate toee_knowledge database (S-ISO). Only runs on
      # first init of an empty toee_pgdata volume -- see the script's own
      # comment for how an existing volume (or CI) gets toee_knowledge instead.
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toee -d toee_va"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Turn worker (0.0.4 S02, FR-9/FR-10, ADR-0153). Claims `agent_turn` jobs only --
  # FR-9 isolation IS the claim allowlist, so a slow background job (S04) can never
  # queue ahead of a customer turn. Same image as the gateway, different command;
  # the gateway process now only enqueues.
  #
  #   docker compose up -d turn-worker      (needs a configured hermes-runtime/.env)
  turn-worker:
    build:
      context: .
      dockerfile: hermes-runtime/Dockerfile
    container_name: toee-va-turn-worker
    command: ["uv", "run", "--frozen", "python", "-m", "hermes_runtime.turn_worker"]
    env_file:
      # Secrets + integration config (OPENROUTER_API_KEY, TEXTLINE_ACCESS_TOKEN or
      # REPLY_SENDER=simulated, COMPOSIO_*). Optional so `docker compose up postgres`
      # still works on a checkout nobody has configured yet.
      - path: ./hermes-runtime/.env
        required: false
    environment:
      # In-network DSN; overrides the localhost-shaped one in hermes-runtime/.env.
      DATABASE_URL: postgresql://toee:toee@postgres:5432/toee_va
      # One turn at a time -- see turn_worker.WORKER_POOL_MAX_SIZE for the reasoning.
      DATABASE_POOL_MAX_SIZE: "4"
      # The durable path needs the shared store: the worker reloads the context the
      # gateway persisted (ADR-0107), which an in-memory store cannot cross.
      TOOL_BACKEND: datastore
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # The graceful-stop budget, and the thing that makes turn_worker's SIGTERM
    # handler more than decoration. SIGTERM only sets a flag; the in-flight turn
    # then has this long to finish and release its lease before Docker SIGKILLs.
    # Docker's default is 10s -- well under a live LLM turn -- so without this every
    # `docker compose restart` landing mid-turn kills the worker anyway and strands
    # that customer's job for the full lease. Exactly what the handler exists to stop.
    # Keep this ABOVE job_queue.DEFAULT_LEASE_SECONDS (300s -- the longest turn the
    # lease is sized for). The two move together: change the lease, change this.
    stop_grace_period: 310s

  # Background worker (0.0.4 S04, FR-9 background half / FR-11, ADR-0153). Claims
  # `l6_review`, `retention` and `ingest` -- never `agent_turn`. That allowlist IS
  # the isolation: a corpus re-ingest that runs for minutes cannot queue ahead of
  # a customer's turn, because the two processes claim disjoint type sets.
  #
  # It also runs the SCHEDULE TICK (background_worker.SCHEDULES). There is no cron
  # in this repo: if this service is not up, no recurring job type ever runs.
  #
  #   docker compose up -d background-worker
  background-worker:
    build:
      context: .
      dockerfile: hermes-runtime/Dockerfile
    container_name: toee-va-background-worker
    command: ["uv", "run", "--frozen", "python", "-m", "hermes_runtime.background_worker"]
    env_file:
      - path: ./hermes-runtime/.env
        required: false
    environment:
      # In-network DSNs; override the localhost-shaped ones in hermes-runtime/.env.
      DATABASE_URL: postgresql://toee:toee@postgres:5432/toee_va
      # Ingest reads/writes the SEPARATE knowledge database (S-ISO).
      KNOWLEDGE_DATABASE_URL: postgresql://toee:toee@postgres:5432/toee_knowledge
      # One job at a time -- see background_worker.WORKER_POOL_MAX_SIZE. The heavy
      # ingest work lives on the knowledge pool, not this one.
      DATABASE_POOL_MAX_SIZE: "4"
      # Same boot requirement as the turn worker: the job bodies read and write the
      # shared store, which an in-memory backend cannot cross. main() fails closed.
      TOOL_BACKEND: datastore
      # Stage A's pull artifact, for a queued re-ingest. Left unset here on purpose:
      # an operator mounts the corpus and sets this, and an ingest job with nothing
      # to ingest fails loudly naming this variable rather than wiping the corpus.
      # INGEST_CORPUS_PATH: /corpus/corpus.json
      #
      # The L6 review fork EXECUTES here but is ENQUEUED by the copilot/dispatch
      # process, so these two must be set the same on both. Default OFF, so unset
      # means no `l6_review` job is ever created and this worker never needs them.
      # The day the flag goes on in the dispatch process it must go on here too:
      # otherwise every l6_review job dead-letters with L6ReviewMisconfigured
      # (deliberately loud -- the alternative is a job reporting `succeeded`
      # having written no agent_experience row). Usually supplied via the
      # hermes-runtime/.env above; named here so the coupling is visible.
      # AGENT_EXPERIENCE_LEARNING: "on"
      # OPENROUTER_API_KEY: sk-or-...
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Same coupling as turn-worker: keep this ABOVE job_queue.DEFAULT_LEASE_SECONDS
    # (300s). SIGTERM only sets a flag, so the in-flight job -- which for `ingest`
    # is the longest thing this process runs -- gets this long to finish and release
    # its lease before Docker SIGKILLs. Change the lease, change this.
    stop_grace_period: 310s

volumes:
  toee_pgdata:
