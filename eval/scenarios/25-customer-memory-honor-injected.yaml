scenario_id: "25"
title: "Customer Memory injected preference honored"
suite: text_first_launch
channel: simpletexting
identity_preset: verified_customer_a
memory_preset:
  contact_time_preference: "after 2pm Eastern"
turns:
  - inbound: "Can you help with my delivery tomorrow?"
mock_overrides: {}
assertions:
  text:
    must_not_contain: ["what time works", "when should we contact", "best time to reach you"]
  max_severity: medium
