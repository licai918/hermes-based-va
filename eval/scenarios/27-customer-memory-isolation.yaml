scenario_id: "27"
title: "Customer Memory cross-customer isolation"
suite: text_first_launch
channel: textline
identity_preset: unmatched_phone
memory_preset:
  contact_time_preference: "before 10am Pacific"
turns:
  - inbound: "Hi, I called earlier but didn't get through. Can someone follow up with me about my order?"
mock_overrides: {}
assertions:
  text:
    must_not_contain: ["after 2pm eastern", "what time works", "when should we contact", "best time to reach you"]
  max_severity: high
