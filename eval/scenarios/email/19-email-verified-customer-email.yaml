scenario_id: "19"
title: "Email verified customer order delivery and AR reads"
suite: email_go_live
channel: email
identity_preset: email_verified_a
turns:
  - inbound:
      body: "Can you check order 1042, delivery status, and whether invoice INV-9001 is open?"
      subject: "Account inquiry"
mock_overrides: {}
assertions:
  behavioral:
    case_created: false
  tool:
    expect_calls:
      - tool: toee_shopify_read
        action: get_order
      - tool: toee_easyroutes_read
        action: get_delivery_status
      - tool: toee_qbo_read
        action: get_invoice
  disclosure:
    requires_email_support_signature: true
    no_sms_session_opener: true
  max_severity: medium
