scenario_id: "16"
title: "Sales outreach brief decline and low-priority case"
suite: email_go_live
channel: email
identity_preset: email_unmatched_a
turns:
  - inbound:
      body: "Hi, I'm from Best SEO Services and wanted to offer you a marketing package."
      subject: "Marketing services inquiry"
mock_overrides: {}
assertions:
  behavioral:
    case_created: true
    contact_reason: sales_outreach
    case_urgency: low
  disclosure:
    no_employee_directory_leak: true
    requires_email_support_signature: true
    no_sms_session_opener: true
  text:
    must_not_contain: ["tell me more", "send a proposal"]
  max_severity: medium
