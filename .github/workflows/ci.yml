name: CI

# Slice 29 (issue #31): the text_first_launch full-suite CI gate. Three parallel
# jobs make a PR mergeable only when the TypeScript surfaces typecheck + test, the
# Python plugin/eval suites pass, and the authoritative Launch Eval replay gate
# reports zero high-severity failures (ADR-0010, ADR-0074, ADR-0121).
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # NFR-6: no credential lands in a commit. One job for the whole repo (0.0.4
  # S12) -- S14's EasyRoutes tokens and every later integration add a name to
  # SECRET_VARS in the script, not another job. No checkout depth needed: the
  # gate scans the tree at this ref, which is what a merge would publish.
  secret-scan:
    name: Secret scan (tracked files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Selfcheck the gate's own rules
        run: node scripts/secret-scan.mjs --selfcheck
      - name: Scan tracked files
        run: node scripts/secret-scan.mjs

  node:
    name: Node typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all workspaces
        run: pnpm -r typecheck
      - name: Unit tests (workbench + packages)
        run: pnpm test

  eval-gate:
    name: Launch Eval gate (text_first_launch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Plugin + eval_runner unit tests
        working-directory: hermes
        run: uv run --frozen pytest -q
      # Authoritative go-live gate: replays recorded transcripts deterministically
      # (no network/LLM) and exits non-zero on any high-severity scenario failure.
      - name: Launch Eval replay gate
        working-directory: hermes
        run: uv run --frozen python -m eval_runner --suite text_first_launch --harness replay --transcripts-dir ../eval/transcripts

  runtime:
    name: Hermes runtime + gateway embedding
    runs-on: ubuntu-latest
    # Matches docker-compose.yml's postgres service (same user/pass/db) so the
    # datastore/E2E acceptance tests (hermes-runtime/tests/conftest.py's
    # temp_schema_conn) find a real Postgres instead of skipping (ADR-0142).
    # POSTGRES_USER is granted superuser by the official image, so `toee` can
    # CREATE DATABASE -- the knowledge fixtures self-provision toee_knowledge
    # via ensure_database() with zero extra CI setup (S30/NFR-7).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: toee
          POSTGRES_PASSWORD: toee
          POSTGRES_DB: toee_va
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://toee:toee@localhost:5432/toee_va
      KNOWLEDGE_DATABASE_URL: postgresql://toee:toee@localhost:5432/toee_knowledge
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      # toee_va needs the business migrations applied before the tests run (some,
      # e.g. test_knowledge_ingest.py's policy-slot read, hit the DB's default
      # schema directly rather than a throwaway one). toee_knowledge has no
      # equivalent step: it self-provisions + self-migrates inside the test
      # fixtures (ensure_database / run_migrations against a throwaway schema).
      - name: Apply business datastore migrations (toee_va)
        working-directory: hermes-runtime
        run: uv run --frozen python -m hermes_runtime.datastore.migrate
      # Installs the pinned upstream hermes-agent (git rev) and exercises the
      # embedded AIAgent turn + FastAPI gateway webhook routes.
      #
      # NFR-7 gate: -rs prints one summary line per skip. The live-Postgres
      # suites (hermes-runtime/tests/test_datastore_*.py, test_knowledge_*.py,
      # test_job_queue.py) previously skipped silently with no Postgres in CI
      # (the 0.0.1 debt) -- now that a Postgres service is provisioned above,
      # any skip left in those files fails the job, except the one documented,
      # intentional skip: the live-embedder smoke tests guard themselves with
      # "fastembed not installed" (fastembed is not a project dependency, so
      # this always skips in CI -- no 100MB+ model download).
      #
      # test_job_queue.py (0.0.4 S01), test_turn_worker.py (S02),
      # test_outbound_send.py (S03) and test_background_worker.py (S04) are in the
      # pattern because those tests are the ENTIRE evidence for the durable-queue,
      # crash-recovery, outbound-idempotency and FR-9 worker-isolation acceptance
      # gates -- a silent skip there is a green build proving nothing. S03's is the
      # one that proves a replayed turn does not text a customer twice; S04's is
      # the one that proves a long ingest cannot delay a customer's turn.
      #
      # test_composio_sdk_pin.py (0.0.4 S12) is in the pattern for a different
      # reason: it guards on `pytest.importorskip("composio")`, so dropping the SDK
      # from the lock would make the ENTIRE pin gate vanish while CI stayed green --
      # the one gate whose job is to notice an SDK surface change (fix wave 1,
      # review Finding 8).
      - name: Runtime + gateway tests
        working-directory: hermes-runtime
        run: |
          set -o pipefail
          uv run --frozen pytest -q -rs 2>&1 | tee /tmp/pytest-runtime.log
          if grep -E '^SKIPPED .*tests/test_(datastore_|knowledge_|job_queue|turn_worker|outbound_send|background_worker|dead_letter_view|composio_sdk_pin)' /tmp/pytest-runtime.log \
              | grep -v 'fastembed not installed'; then
            echo "::error::live-Postgres test skipped despite CI Postgres (NFR-7) -- see hermes-runtime/tests"
            exit 1
          fi
